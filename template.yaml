AWSTemplateFormatVersion: '2010-09-09'
Description: Agente Autónomo de Soporte al Cliente - TechStore (Amazon Bedrock + CloudFormation, con RAG vía S3 Vectors)

Parameters:
  ProjectName:
    Type: String
    Default: techstore-agente
    Description: Nombre base para todos los recursos del taller
  BucketName:
    Type: String
    Description: Nombre del bucket S3 donde se subió el código Lambda y los documentos seed (kb-data/)
  KnowledgeBaseDataPrefix:
    Type: String
    Default: "kb-data/"
    Description: Prefijo dentro del bucket S3 donde están los documentos a indexar
  EmbeddingModelId:
    Type: String
    Default: "amazon.titan-embed-text-v2:0"
    Description: >
      Modelo de embeddings de Bedrock. Titan v2 entrega 1024 dimensiones y
      soporta español. Si lo cambias por otro, ajusta también la propiedad
      Dimension del recurso VectorIndex.
  AliasUpdateToken:
    Type: String
    Default: "1"
    Description: >
      Cambiar este valor en cada despliegue (deploy.sh usa $(date +%s)) fuerza
      una actualización del Alias del agente. Como el Alias no tiene
      RoutingConfiguration, AWS crea una versión nueva del agente y apunta el
      Alias a ella, propagando los cambios en ActionGroups, instrucciones,
      RequireConfirmation y la asociación con la Knowledge Base.
  WebLambdaS3Key:
    Type: String
    Default: chat_lambda.zip
    Description: Clave S3 del ZIP de la Lambda demo web (Haiku vs agente, streaming)

Resources:

  # ─────────────────────────────────────────────────────────────
  # 1. ROL IAM PARA LA FUNCIÓN LAMBDA (ejecuta las herramientas)
  # ─────────────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # ─────────────────────────────────────────────────────────────
  # 2. FUNCIÓN LAMBDA (manejador de herramientas del agente)
  # ─────────────────────────────────────────────────────────────
  AgentActionHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-action-handler"
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 30
      Code:
        S3Bucket: !Ref BucketName
        S3Key: lambda.zip

  # Permite que el servicio Bedrock invoque la Lambda
  LambdaBedrockPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AgentActionHandler.Arn
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com

  # ─────────────────────────────────────────────────────────────
  # 3. ROL IAM PARA EL AGENTE DE BEDROCK
  #    IMPORTANTE: el nombre DEBE empezar con este prefijo exacto
  #    Incluye permisos para invocar modelos Y consultar la Knowledge Base
  # ─────────────────────────────────────────────────────────────
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "AmazonBedrockExecutionRoleForAgents_${ProjectName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockModelInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"  # Restringir al modelo específico en producción
        - PolicyName: BedrockKnowledgeBaseRetrieve
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: "*"

  # ─────────────────────────────────────────────────────────────
  # 4. KNOWLEDGE BASE (RAG con S3 Vectors)
  #    Sub-recursos:
  #      - VectorBucket   (bucket nativo de S3 Vectors)
  #      - VectorIndex    (índice 1024 dim, distancia coseno, float32)
  #      - KnowledgeBaseRole   (permisos S3 + s3vectors + InvokeModel embeddings)
  #      - KnowledgeBase  (tipo VECTOR con S3_VECTORS storage)
  #      - DataSource     (apunta al prefijo kb-data/ del bucket S3)
  # ─────────────────────────────────────────────────────────────
  VectorBucket:
    Type: AWS::S3Vectors::VectorBucket

  VectorIndex:
    Type: AWS::S3Vectors::Index
    Properties:
      VectorBucketArn: !GetAtt VectorBucket.VectorBucketArn
      DataType: float32
      Dimension: 1024  # Coincide con amazon.titan-embed-text-v2:0
      DistanceMetric: cosine

  KnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "AmazonBedrockExecutionRoleForKnowledgeBase_${ProjectName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*"
      Policies:
        - PolicyName: S3DataSourceRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"
                Condition:
                  StringEquals:
                    aws:PrincipalAccount: !Ref AWS::AccountId
        - PolicyName: S3VectorsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3vectors:PutVectors
                  - s3vectors:GetVectors
                  - s3vectors:DeleteVectors
                  - s3vectors:QueryVectors
                  - s3vectors:GetIndex
                  - s3vectors:ListIndexes
                Resource: !Ref VectorIndex
        - PolicyName: BedrockEmbeddingsInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${EmbeddingModelId}"

  TechstoreKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    DependsOn: VectorIndex
    Properties:
      Name: !Sub "${ProjectName}-kb"
      # CloudFormation limita Description a 200 caracteres en este recurso
      Description: "Politicas, FAQ, catalogo, TechCoins y sucursales de TechStore. Embeddings Titan v2 + S3 Vectors."
      RoleArn: !GetAtt KnowledgeBaseRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/${EmbeddingModelId}"
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          VectorBucketArn: !GetAtt VectorBucket.VectorBucketArn
          IndexArn: !Ref VectorIndex

  TechstoreDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      Name: !Sub "${ProjectName}-ds-s3"
      Description: Documentos seed (políticas, FAQ, catálogo) almacenados en S3.
      KnowledgeBaseId: !Ref TechstoreKnowledgeBase
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !Sub "arn:aws:s3:::${BucketName}"
          InclusionPrefixes:
            - !Ref KnowledgeBaseDataPrefix
      VectorIngestionConfiguration:
        # IMPORTANTE: Bedrock NO permite cambiar ChunkingConfiguration despues de
        # crear el DataSource (ni la estrategia, ni MaxTokens, ni OverlapPercentage).
        # Si quieres probar HIERARCHICAL/SEMANTIC u otros valores, hay que recrear:
        #   bash destroy.sh && bash deploy.sh
        ChunkingConfiguration:
          ChunkingStrategy: FIXED_SIZE
          FixedSizeChunkingConfiguration:
            MaxTokens: 300
            OverlapPercentage: 20

  # ─────────────────────────────────────────────────────────────
  # 5. EL AGENTE DE BEDROCK (asociado a la Knowledge Base)
  # ─────────────────────────────────────────────────────────────
  SupportAgent:
    Type: AWS::Bedrock::Agent
    DependsOn:
      - LambdaBedrockPermission
      - TechstoreKnowledgeBase
    Properties:
      AgentName: !Sub "${ProjectName}-agent"
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      FoundationModel: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
      IdleSessionTTLInSeconds: 1800
      AutoPrepare: true
      Instruction: |
        Eres un agente de soporte al cliente para TechStore, una tienda de electrónica en línea.
        Tu misión es ayudar a los clientes con sus pedidos, procesar reembolsos cuando aplique,
        brindar información sobre productos de nuestro catálogo y responder preguntas sobre
        políticas de la tienda usando la base de conocimiento.

        FUENTES DE INFORMACIÓN QUE TIENES:
        1. Action Group "SoporteAcciones" (datos en tiempo real de pedidos y catálogo).
        2. Knowledge Base de TechStore (políticas de devolución, garantía, envío, métodos de pago,
           FAQ, catálogo extendido, información corporativa, programa de fidelidad TechCoins
           y sucursales físicas).

        CÓMO USAR LA KNOWLEDGE BASE (REGLAS ESTRICTAS):
        - Para preguntas sobre POLÍTICAS, GARANTÍAS, ENVÍOS, MÉTODOS DE PAGO,
          PROGRAMA TECHCOINS, SUCURSALES o INFORMACIÓN DE LA EMPRESA:
          1. Consulta SIEMPRE la base de conocimiento ANTES de responder.
          2. Si la consulta inicial no devuelve la respuesta exacta, REFORMULA la
             búsqueda con sinónimos y vuelve a consultar (mínimo 2 intentos antes
             de rendirte). Por ejemplo: "TechCoins" → "programa de fidelidad",
             "puntos por compra", "monedero TechStore".
          3. CONFÍA en lo que devuelve la KB. Si los fragmentos contienen la
             información solicitada (cifras, equivalencias, plazos, listados), úsala
             directamente para construir la respuesta y CITA con la frase: "Según
             nuestra base de conocimiento de TechStore...".
          4. NO digas "no tengo información" si la KB devolvió fragmentos relevantes;
             extrae los datos del fragmento y respóndele al cliente.
          5. Solo declara desconocimiento ("No tengo esa información en mi base de
             conocimiento") cuando la KB no devuelva NINGÚN fragmento relacionado
             tras al menos 2 búsquedas con palabras distintas.
          6. NO inventes datos que no estén en la KB. Si te preguntan por una
             sucursal, programa o producto que no aparece en los fragmentos
             recuperados, di que no existe esa información y NO supongas.

        REGLAS DE ATENCIÓN AL CLIENTE:
        - Saluda cordialmente en cada conversación.
        - Para solicitudes de reembolso, SIEMPRE llama primero a verificar_pedido para
          confirmar si el pedido es elegible antes de llamar a procesar_reembolso.
        - Si el cliente ya escribió el número de pedido (ORD-XXXX) y el motivo del reembolso
          en el mismo mensaje, llama verificar_pedido y luego procesar_reembolso sin pedir
          aclaraciones adicionales (modo demo del taller).
        - Confirma con el cliente los datos relevantes antes de tomar acciones.
        - Responde SIEMPRE en español, de forma clara y amigable.
        - Si no tienes la información necesaria, pídela al cliente.

      KnowledgeBases:
        # CloudFormation limita esta Description a 200 caracteres
        - KnowledgeBaseId: !Ref TechstoreKnowledgeBase
          Description: "Politicas oficiales de TechStore (devoluciones, garantia, envio, pago), FAQ, catalogo, programa TechCoins y sucursales. Consultar para politicas y datos corporativos."
          KnowledgeBaseState: ENABLED

      ActionGroups:
        - ActionGroupName: SoporteAcciones
          Description: Herramientas para gestionar pedidos y consultar productos de TechStore
          ActionGroupExecutor:
            Lambda: !GetAtt AgentActionHandler.Arn
          FunctionSchema:
            Functions:
              - Name: verificar_pedido
                Description: >
                  Verifica el estado actual de un pedido del cliente, incluyendo
                  si es elegible para reembolso (entregado hace menos de 30 días).
                Parameters:
                  numero_pedido:
                    Description: "Número único del pedido (formato ORD-XXXX, ejemplo: ORD-1001)"
                    Type: string
                    Required: true

              - Name: procesar_reembolso
                Description: >
                  Inicia el proceso de reembolso para un pedido elegible.
                  Solo funciona si el pedido fue entregado hace menos de 30 días.
                RequireConfirmation: ENABLED
                Parameters:
                  numero_pedido:
                    Description: "Número del pedido a reembolsar"
                    Type: string
                    Required: true
                  motivo:
                    Description: "Motivo del reembolso proporcionado por el cliente"
                    Type: string
                    Required: true

              - Name: consultar_producto
                Description: >
                  Obtiene información detallada de un producto del catálogo:
                  precio, stock disponible, garantía y especificaciones técnicas.
                Parameters:
                  nombre_producto:
                    Description: "Nombre del producto a consultar (Laptop, Mouse, Teclado o Monitor)"
                    Type: string
                    Required: true

  # ─────────────────────────────────────────────────────────────
  # 6. ALIAS DEL AGENTE (requerido para invocarlo desde la CLI)
  # ─────────────────────────────────────────────────────────────
  SupportAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !Ref SupportAgent
      AgentAliasName: produccion
      Description: !Sub "Alias produccion - actualizado token=${AliasUpdateToken}"

  # ─────────────────────────────────────────────────────────────
  # 7. DEMO WEB — Sitio estático S3 + Lambda Function URL (RESPONSE_STREAM)
  # ─────────────────────────────────────────────────────────────
  WebFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-web-${AWS::AccountId}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  WebFrontendBucketPublicAccessBlock:
    Type: AWS::S3::BucketPublicAccessBlock
    Properties:
      Bucket: !Ref WebFrontendBucket
      BlockPublicAcls: true
      IgnorePublicAcls: true
      BlockPublicPolicy: false
      RestrictPublicBuckets: false

  WebFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: WebFrontendBucketPublicAccessBlock
    Properties:
      Bucket: !Ref WebFrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${WebFrontendBucket.Arn}/*'

  ChatLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-chat-demo-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockChatDemoInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:InvokeAgent
                Resource: '*'

  ChatLambda:
    Type: AWS::Lambda::Function
    DependsOn:
      - SupportAgentAlias
    Properties:
      FunctionName: !Sub "${ProjectName}-chat-demo"
      Role: !GetAtt ChatLambdaRole.Arn
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          AGENT_ID: !Ref SupportAgent
          ALIAS_ID: !GetAtt SupportAgentAlias.AgentAliasId
          BEDROCK_MODEL_ID: us.anthropic.claude-haiku-4-5-20251001-v1:0
      Code:
        S3Bucket: !Ref BucketName
        S3Key: !Ref WebLambdaS3Key

  ChatLambdaUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt ChatLambda.Arn
      AuthType: NONE
      InvokeMode: RESPONSE_STREAM
      Cors:
        AllowCredentials: false
        AllowHeaders:
          - content-type
        AllowMethods:
          - POST
          - OPTIONS
        AllowOrigins:
          - '*'
        MaxAge: 86400

  ChatLambdaUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatLambda
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

# ─────────────────────────────────────────────────────────────
# OUTPUTS: valores que necesitarás para probar el agente
# ─────────────────────────────────────────────────────────────
Outputs:
  AgentId:
    Value: !Ref SupportAgent
    Description: ID del Agente de Bedrock

  AgentAliasId:
    Value: !GetAtt SupportAgentAlias.AgentAliasId
    Description: ID del Alias del Agente (necesario para invocarlo)

  LambdaFunctionName:
    Value: !Ref AgentActionHandler
    Description: Nombre de la función Lambda (action handler)

  KnowledgeBaseId:
    Value: !Ref TechstoreKnowledgeBase
    Description: ID de la Knowledge Base (RAG)

  DataSourceId:
    Value: !GetAtt TechstoreDataSource.DataSourceId
    Description: ID del Data Source asociado al bucket S3 (kb-data/)

  VectorBucketArn:
    Value: !GetAtt VectorBucket.VectorBucketArn
    Description: ARN del bucket nativo de S3 Vectors usado por la KB

  FrontendBucket:
    Value: !Ref WebFrontendBucket
    Description: Bucket S3 del sitio web estático (demo comparativa chatbot vs agente)

  FrontendUrl:
    Value: !Sub "http://${WebFrontendBucket}.s3-website-${AWS::Region}.amazonaws.com/"
    Description: URL HTTP del website S3 (sin CloudFront)

  ChatFunctionUrl:
    Value: !GetAtt ChatLambdaUrl.FunctionUrl
    Description: Lambda Function URL (RESPONSE_STREAM) para la demo web
